<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍄 내 아바타 꾸미기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="avatar.css">
</head>
<body>

<div class="toolbar">
  <button class="btn blue" id="backBtn">← 돌아가기</button>
  <div class="toolbar-title" id="studentTitle">🍄 아바타</div>
  <div class="heart-display">🪙 <span class="heart-num" id="heartCount">0</span></div>
</div>

<div id="genderWait" style="display:none;">
  <div class="panel-title" style="font-size:16px;">🐣 선생님이 아직 아바타를 준비 중이에요.<br>조금만 기다려주세요!</div>
</div>

<div id="mainArea" style="display:none;">
  <div id="avatarPanel">
    <div class="panel-title">내 아바타</div>
    <div id="avatarStage">
      <div id="avatarStageInner">
        <img id="avatarBgImg" src="" alt="" style="display:none;">
        <img id="avatarBaseImg" src="" alt="내 아바타">
        <img id="avatarOutfitImg" src="" alt="" style="display:none;">
        <img id="avatarHairImg" src="" alt="" style="display:none;">
      </div>
      <img class="frame-corner tl" id="frameTL" src="" alt="" style="display:none;">
      <img class="frame-corner tr" id="frameTR" src="" alt="" style="display:none;">
      <img class="frame-corner bl" id="frameBL" src="" alt="" style="display:none;">
      <img class="frame-corner br" id="frameBR" src="" alt="" style="display:none;">
    </div>
    <div id="titlePreview" style="display:none;">
      <img id="titleIcon" src="" alt="">
      <span id="titleText"></span>
    </div>
  </div>

  <div id="shopPanel">
    <div class="tabs">
      <button class="tab-btn cat-tab active" data-cat="outfit">👕 옷</button>
      <button class="tab-btn cat-tab" data-cat="hair">💇 머리</button>
      <button class="tab-btn cat-tab" data-cat="background">🖼 배경</button>
      <button class="tab-btn cat-tab" data-cat="frame">🎖️ 테두리</button>
      <button class="tab-btn cat-tab" data-cat="title">🏅 칭호</button>
    </div>
    <div class="tabs">
      <button class="tab-btn mode-tab active" data-tab="shop">🛒 상점</button>
      <button class="tab-btn mode-tab" data-tab="inventory">🎒 보관함</button>
    </div>
    <div class="item-grid" id="itemGrid"></div>
  </div>
</div>

<div id="notFound" style="display:none;">
  <div class="panel-title" style="font-size:16px;">학생 정보를 찾을 수 없어요.</div>
  <button class="btn" id="backBtn2">← 자리판으로 돌아가기</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="assets/items.js"></script>
<script src="avatar.js"></script>
</body>
</html>
